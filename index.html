<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Our Space</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    .jar-liquid { transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes float-up {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
    }
    .floating-heart { position: absolute; animation: float-up 0.8s ease-out forwards; pointer-events: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-gray-50 overscroll-none select-none">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyAd64Xht4RMPgIBYNssGYeYxFB_zyZUTsk",
      authDomain: "our-space-79672.firebaseapp.com",
      projectId: "our-space-79672",
      storageBucket: "our-space-79672.firebasestorage.app",
      messagingSenderId: "350345009230",
      appId: "1:350345009230:web:91fb621714c21d7e264b1f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const Icon = ({ name, size=24, className="", fill="none" }) => {
      const icons = {
        heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>,
        sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
        chat: <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z",
        send: <polygon points="22 2 15 22 11 13 2 9 22 2"/>,
        lock: <path d="M7 11V7a5 5 0 0 1 10 0v4M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z"/>
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name]}
        </svg>
      );
    };

    function App() {
      const [isUnlocked, setIsUnlocked] = useState(() => localStorage.getItem('os_unlocked') === 'true');
      const [activeProfile, setActiveProfile] = useState(() => localStorage.getItem('sl_profile'));
      const [activeTab, setActiveTab] = useState('fun');
      const [jarData, setJarData] = useState({ currentCount: 0 });
      const [messages, setMessages] = useState([]);
      const [clickEffect, setClickEffect] = useState(null);
      const [passInput, setPassInput] = useState("");
      const chatEndRef = useRef(null);

      useEffect(() => {
        auth.signInAnonymously().then(() => {
          db.collection("shared").doc("jar").onSnapshot((doc) => {
            if (doc.exists) setJarData(doc.data());
            else db.collection("shared").doc("jar").set({ currentCount: 0 });
          });
          db.collection("messages").orderBy("timestamp", "desc").limit(30).onSnapshot((snap) => {
            setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })).reverse());
          });
        });
      }, []);

      useEffect(() => {
        if (activeTab === 'chat') chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, activeTab]);

      const handleUnlock = (e) => {
        e.preventDefault();
        if (passInput.trim().toLowerCase() === "nikiarjun") {
          setIsUnlocked(true);
          localStorage.setItem('os_unlocked', 'true');
        } else {
          alert("Incorrect Password");
        }
      };

      const addHeart = async (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;
        setClickEffect({ x, y });
        setTimeout(() => setClickEffect(null), 800);

        try {
          await db.collection("shared").doc("jar").update({
            currentCount: firebase.firestore.FieldValue.increment(1)
          });
        } catch (err) {
          console.error("Database Locked!", err);
        }
      };

      const handleSend = async (e) => {
        e.preventDefault();
        const text = e.target.msg.value;
        if (!text.trim()) return;
        e.target.msg.value = "";
        await db.collection("messages").add({
          text, sender: activeProfile, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
      };

      if (!isUnlocked) return (
        <div className="h-screen flex flex-col items-center justify-center p-6 bg-white">
          <Icon name="lock" size={48} className="text-rose-500 mb-4" />
          <form onSubmit={handleUnlock} className="w-full max-w-xs space-y-4">
            <input 
              type="text" 
              placeholder="Password" 
              className="w-full p-4 bg-gray-50 rounded-2xl text-center outline-none border-2 border-transparent focus:border-rose-100 font-bold"
              value={passInput}
              onChange={(e) => setPassInput(e.target.value)}
            />
            <button className="w-full p-4 bg-rose-500 text-white rounded-2xl font-bold">Unlock</button>
          </form>
        </div>
      );

      if (!activeProfile) return (
        <div className="h-screen flex flex-col items-center justify-center bg-rose-50 p-6 space-y-4">
          <button onClick={() => {setActiveProfile('partner1'); localStorage.setItem('sl_profile', 'partner1')}} className="w-full max-w-xs p-6 bg-white rounded-3xl shadow-sm text-xl font-bold text-rose-500">Niki</button>
          <button onClick={() => {setActiveProfile('partner2'); localStorage.setItem('sl_profile', 'partner2')}} className="w-full max-w-xs p-6 bg-white rounded-3xl shadow-sm text-xl font-bold text-rose-500">Arjun</button>
        </div>
      );

      const fillPercentage = Math.min(100, (jarData.currentCount / 1000) * 100);

      return (
        <div className="h-screen flex flex-col bg-gray-50 max-w-md mx-auto overflow-hidden">
          <main className="flex-1 relative flex flex-col p-6 overflow-hidden">
            {activeTab === 'fun' ? (
              <div className="flex flex-col items-center justify-between h-full py-10">
                <h2 className="text-2xl font-bold text-gray-800">The Mood Jar</h2>
                
                <div className="relative w-56 h-80 bg-white/40 border-4 border-white rounded-b-[80px] rounded-t-xl shadow-2xl overflow-hidden flex items-end">
                  <div 
                    className="w-full bg-gradient-to-t from-rose-500 to-pink-400 jar-liquid" 
                    style={{ height: `${fillPercentage}%` }}
                  />
                  <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <span className="text-4xl font-black text-white drop-shadow-md">{jarData.currentCount}</span>
                  </div>
                </div>

                <button 
                  onPointerDown={addHeart}
                  className="relative w-28 h-28 bg-rose-500 rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-transform"
                >
                  <Icon name="heart" size={48} fill="currentColor" className="text-white" />
                  {clickEffect && (
                    <div className="floating-heart text-rose-300" style={{ left: clickEffect.x, top: clickEffect.y }}>
                      <Icon name="heart" size={32} fill="currentColor" />
                    </div>
                  )}
                </button>
                <p className="text-gray-400 font-medium">Tap to add a heart</p>
              </div>
            ) : (
              <div className="flex flex-col h-full">
                <div className="flex-1 overflow-y-auto space-y-2 mb-4 hide-scrollbar">
                  {messages.map(m => (
                    <div key={m.id} className={`flex ${m.sender === activeProfile ? 'justify-end' : 'justify-start'}`}>
                      <div className={`p-3 rounded-2xl max-w-[80%] ${m.sender === activeProfile ? 'bg-rose-500 text-white rounded-br-none' : 'bg-white border rounded-bl-none'}`}>{m.text}</div>
                    </div>
                  ))}
                  <div ref={chatEndRef} />
                </div>
                <form onSubmit={handleSend} className="flex gap-2 bg-white p-2 rounded-2xl shadow-sm border">
                  <input name="msg" className="flex-1 p-2 outline-none text-sm" placeholder="Message..." />
                  <button className="bg-rose-500 text-white p-2 rounded-xl"><Icon name="send" size={18} fill="currentColor" /></button>
                </form>
              </div>
            )}
          </main>

          <nav className="p-6 bg-white border-t flex justify-around">
            <button onClick={() => setActiveTab('chat')} className={activeTab === 'chat' ? 'text-rose-500' : 'text-gray-300'}><Icon name="chat" size={32}/></button>
            <button onClick={() => setActiveTab('fun')} className={activeTab === 'fun' ? 'text-rose-500' : 'text-gray-300'}><Icon name="sparkles" size={32}/></button>
            <button onClick={() => {localStorage.clear(); window.location.reload();}} className="text-gray-300"><Icon name="lock" size={24}/></button>
          </nav>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
