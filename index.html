<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Our Space</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    /* Force the liquid to animate height */
    .liquid-fill { transition: height 0.7s ease-in-out; }
    
    /* Simple Float Animation */
    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-80px); opacity: 0; }
    }
    .heart-pop { position: absolute; animation: floatUp 0.6s ease-out forwards; }
  </style>
</head>
<body class="bg-[#FFF5F7]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Firebase Setup ---
    const firebaseConfig = {
      apiKey: "AIzaSyAd64Xht4RMPgIBYNssGYeYxFB_zyZUTsk",
      authDomain: "our-space-79672.firebaseapp.com",
      projectId: "our-space-79672",
      storageBucket: "our-space-79672.firebasestorage.app",
      messagingSenderId: "350345009230",
      appId: "1:350345009230:web:91fb621714c21d7e264b1f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    function App() {
      const [user, setUser] = useState(localStorage.getItem('user_choice'));
      const [count, setCount] = useState(0);
      const [pop, setPop] = useState(null);

      useEffect(() => {
        auth.signInAnonymously().then(() => {
          // Listen to the jar count
          db.collection("shared").doc("jar").onSnapshot((doc) => {
            if (doc.exists) {
              setCount(doc.data().currentCount || 0);
            } else {
              // Create it if it doesn't exist
              db.collection("shared").doc("jar").set({ currentCount: 0 });
            }
          });
        });
      }, []);

      const handleAddHeart = async (e) => {
        // Visual Pop
        const rect = e.currentTarget.getBoundingClientRect();
        setPop({ x: e.clientX - rect.left, y: e.clientY - rect.top });
        setTimeout(() => setPop(null), 600);

        // Update Database
        const newCount = count + 1;
        if (newCount >= 1000) {
          await db.collection("shared").doc("jar").update({ currentCount: 0 });
          alert("🎉 1000 HEARTS! The jar has been reset!");
        } else {
          await db.collection("shared").doc("jar").update({
            currentCount: firebase.firestore.FieldValue.increment(1)
          });
        }
      };

      if (!user) return (
        <div className="h-screen flex flex-col items-center justify-center p-10 space-y-4">
          <h1 className="text-2xl font-bold text-rose-600">Who is here?</h1>
          <button onClick={() => {setUser('Niki'); localStorage.setItem('user_choice', 'Niki')}} className="w-full p-5 bg-white rounded-2xl shadow-md text-xl font-bold">Niki</button>
          <button onClick={() => {setUser('Arjun'); localStorage.setItem('user_choice', 'Arjun')}} className="w-full p-5 bg-white rounded-2xl shadow-md text-xl font-bold">Arjun</button>
        </div>
      );

      const fillHeight = (count / 1000) * 100;

      return (
        <div className="h-screen flex flex-col items-center justify-between py-12 bg-[#FFF5F7]">
          <div className="text-center">
            <h2 className="text-3xl font-black text-rose-500">Our Mood Jar</h2>
            <p className="text-rose-300 font-bold uppercase text-xs tracking-widest mt-1">Logged in as {user}</p>
          </div>

          {/* THE JAR (Constructed with basic divs for maximum compatibility) */}
          <div className="relative w-60 h-80 flex items-end justify-center">
            {/* Glass Container */}
            <div className="absolute inset-0 border-4 border-white bg-white/30 rounded-b-[80px] rounded-t-xl shadow-xl overflow-hidden">
              {/* The Liquid */}
              <div 
                className="absolute bottom-0 w-full bg-gradient-to-t from-rose-500 to-pink-300 liquid-fill"
                style={{ height: `${fillHeight}%` }}
              />
              
              {/* The Number */}
              <div className="absolute inset-0 flex items-center justify-center">
                <span className="text-5xl font-black text-rose-900/20">{count}</span>
              </div>
            </div>
            
            {/* Reflection shine on glass */}
            <div className="absolute top-4 left-4 w-4 h-20 bg-white/20 rounded-full pointer-events-none" />
          </div>

          {/* THE BUTTON */}
          <div className="flex flex-col items-center space-y-4 w-full px-10">
            <button 
              onClick={handleAddHeart}
              className="relative w-24 h-24 bg-rose-500 rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-transform"
            >
              <svg width="40" height="40" viewBox="0 0 24 24" fill="white" stroke="white" strokeWidth="2">
                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
              </svg>
              
              {pop && (
                <div className="heart-pop" style={{ left: pop.x, top: pop.y }}>
                  <svg width="30" height="30" viewBox="0 0 24 24" fill="#FDA4AF"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                </div>
              )}
            </button>
            <p className="text-rose-400 font-bold text-sm tracking-tighter">TAP TO FILL THE JAR</p>
            <button onClick={() => {localStorage.clear(); window.location.reload();}} className="text-[10px] text-rose-200 underline mt-4">Switch User</button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
