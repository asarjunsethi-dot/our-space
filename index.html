<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Our Space</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body { background-color: #FFF5F7; -webkit-tap-highlight-color: transparent; }
    .liquid-fill { transition: height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes heartFloat { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    .heart-pop { position: absolute; animation: heartFloat 0.7s ease-out forwards; pointer-events: none; z-index: 50; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .nav-active { color: #f43f5e; transform: scale(1.2); }
  </style>
</head>
<body class="overscroll-none select-none">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyAd64Xht4RMPgIBYNssGYeYxFB_zyZUTsk",
      authDomain: "our-space-79672.firebaseapp.com",
      projectId: "our-space-79672",
      storageBucket: "our-space-79672.firebasestorage.app",
      messagingSenderId: "350345009230",
      appId: "1:350345009230:web:91fb621714c21d7e264b1f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const Icon = ({ name, size=24, color="currentColor", fill="none" }) => {
      const paths = {
        heart: "M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z",
        chat: "M7.9 20A9 9 0 1 0 4 16.1L2 22Z",
        star: "m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z",
        send: "M22 2 11 13M22 2l-7 20-4-9-9-4 22-7Z",
        lock: "M7 11V7a5 5 0 0 1 10 0v4M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z"
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d={paths[name]} />
        </svg>
      );
    };

    function App() {
      const [isUnlocked, setIsUnlocked] = useState(() => localStorage.getItem('os_unlocked') === 'true');
      const [user, setUser] = useState(() => localStorage.getItem('os_user'));
      const [tab, setTab] = useState('jar');
      const [count, setCount] = useState(0);
      const [messages, setMessages] = useState([]);
      const [pop, setPop] = useState(null);
      const [passInput, setPassInput] = useState("");
      const chatEndRef = useRef(null);

      useEffect(() => {
        auth.signInAnonymously().catch(err => alert("Firebase Auth Error: " + err.message));
        
        const unsubJar = db.collection("shared").doc("jar").onSnapshot(doc => {
          if (doc.exists) setCount(doc.data().currentCount || 0);
          else db.collection("shared").doc("jar").set({ currentCount: 0 });
        }, err => console.log("Firestore Error:", err));

        const unsubChat = db.collection("messages").orderBy("timestamp", "desc").limit(50).onSnapshot(snap => {
          setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })).reverse());
        });

        return () => { unsubJar(); unsubChat(); };
      }, []);

      useEffect(() => {
        if (tab === 'chat') chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, tab]);

      const handleUnlock = (e) => {
        e.preventDefault();
        // CASE INSENSITIVE CHECK
        if (passInput.trim().toLowerCase() === "nikiarjun") {
          setIsUnlocked(true);
          localStorage.setItem('os_unlocked', 'true');
        } else {
          alert("Wrong password! Try 'nikiarjun'");
        }
      };

      const handleAddHeart = async (e) => {
        // Handle both Touch and Mouse
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        const rect = e.currentTarget.getBoundingClientRect();
        
        setPop({ x: clientX - rect.left, y: clientY - rect.top });
        setTimeout(() => setPop(null), 600);
        
        const nextCount = count + 1;
        if (nextCount >= 1000) {
          await db.collection("shared").doc("jar").update({ currentCount: 0 });
        } else {
          await db.collection("shared").doc("jar").update({ currentCount: firebase.firestore.FieldValue.increment(1) });
        }
      };

      const handleSend = async (e) => {
        e.preventDefault();
        const input = e.target.elements.msg;
        const text = input.value;
        if (!text.trim()) return;
        input.value = "";
        await db.collection("messages").add({
          text, sender: user, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
      };

      if (!isUnlocked) return (
        <div className="h-screen flex flex-col items-center justify-center p-8 bg-white">
          <div className="bg-rose-50 p-6 rounded-full mb-6">
            <Icon name="lock" size={48} color="#f43f5e" />
          </div>
          <h2 className="mb-8 font-black text-gray-800 text-2xl">Enter Our Space</h2>
          <form onSubmit={handleUnlock} className="w-full max-w-xs space-y-4">
            <input 
              type="text" 
              inputMode="text"
              placeholder="Password" 
              className="w-full p-5 bg-gray-100 rounded-2xl text-center outline-none focus:ring-2 ring-rose-300 font-bold transition-all"
              value={passInput}
              onChange={(e) => setPassInput(e.target.value)}
            />
            <button className="w-full p-5 bg-rose-500 text-white rounded-2xl font-black shadow-lg active:scale-95 transition-all">Unlock</button>
          </form>
          <p className="mt-6 text-xs text-gray-400 font-bold uppercase tracking-widest">Hint: your names (no spaces)</p>
        </div>
      );

      if (!user) return (
        <div className="h-screen flex flex-col items-center justify-center p-10 space-y-4 bg-white">
          <Icon name="heart" size={40} color="#f43f5e" fill="#f43f5e" />
          <h1 className="text-3xl font-black text-gray-900 mb-6">Who are you?</h1>
          <button onClick={() => {setUser('Niki'); localStorage.setItem('os_user', 'Niki')}} className="w-full p-6 bg-rose-50 rounded-3xl text-xl font-bold text-rose-600 border-2 border-rose-100 active:scale-95 transition-transform">Niki</button>
          <button onClick={() => {setUser('Arjun'); localStorage.setItem('os_user', 'Arjun')}} className="w-full p-6 bg-rose-50 rounded-3xl text-xl font-bold text-rose-600 border-2 border-rose-100 active:scale-95 transition-transform">Arjun</button>
        </div>
      );

      return (
        <div className="h-screen flex flex-col bg-[#FFF5F7] max-w-md mx-auto overflow-hidden shadow-2xl border-x border-rose-50">
          <header className="p-5 flex justify-between items-center bg-white/80 backdrop-blur-md border-b border-rose-50 z-20">
            <div className="flex items-center gap-2">
              <Icon name="heart" size={22} color="#f43f5e" fill="#f43f5e" />
              <span className="font-black text-rose-600 tracking-tighter text-xl">OUR SPACE</span>
            </div>
            <button onClick={() => {localStorage.clear(); window.location.reload();}} className="text-[10px] font-black text-rose-400 uppercase bg-rose-50 px-3 py-1.5 rounded-lg">Reset</button>
          </header>

          <main className="flex-1 relative overflow-hidden flex flex-col">
            {tab === 'jar' && (
              <div className="flex-1 flex flex-col items-center justify-around py-8 px-6">
                <div className="text-center">
                  <h2 className="text-2xl font-black text-rose-900 uppercase tracking-tight">The Mood Jar</h2>
                  <p className="text-rose-400 font-bold text-xs mt-1 italic">Fill it with love...</p>
                </div>

                <div className="relative w-64 h-80 flex items-end justify-center">
                  <div className="absolute inset-0 border-[8px] border-white bg-white/40 rounded-b-[100px] rounded-t-[40px] shadow-2xl overflow-hidden">
                    <div className="absolute bottom-0 w-full bg-gradient-to-t from-rose-500 via-pink-400 to-rose-300 liquid-fill" style={{ height: `${(count/1000)*100}%` }} />
                    <div className="absolute inset-0 flex items-center justify-center">
                      <span className="text-7xl font-black text-rose-950/10">{count}</span>
                    </div>
                  </div>
                  <div className="absolute top-8 left-10 w-4 h-24 bg-white/20 rounded-full" />
                </div>

                <button 
                  onPointerDown={handleAddHeart} 
                  className="relative w-32 h-32 bg-rose-500 rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform border-4 border-white"
                >
                  <Icon name="heart" size={56} color="white" fill="white" />
                  {pop && <div className="heart-pop" style={{ left: pop.x, top: pop.y }}><Icon name="heart" size={40} color="#FDA4AF" fill="#FDA4AF" /></div>}
                </button>
              </div>
            )}

            {tab === 'chat' && (
              <div className="flex-1 flex flex-col h-full bg-white/20">
                <div className="flex-1 overflow-y-auto p-4 space-y-4 hide-scrollbar">
                  {messages.map(m => (
                    <div key={m.id} className={`flex ${m.sender === user ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[85%] p-4 shadow-sm text-sm font-bold leading-relaxed ${m.sender === user ? 'bg-rose-500 text-white rounded-2xl rounded-br-none' : 'bg-white text-rose-900 rounded-2xl rounded-bl-none'}`}>
                        {m.text}
                      </div>
                    </div>
                  ))}
                  <div ref={chatEndRef} />
                </div>
                <form onSubmit={handleSend} className="p-4 bg-white flex gap-2 border-t border-rose-50">
                  <input name="msg" autoComplete="off" className="flex-1 bg-gray-50 p-4 rounded-2xl outline-none text-sm font-bold focus:ring-2 ring-rose-100 transition-all" placeholder="Message..." />
                  <button className="bg-rose-500 text-white p-4 rounded-2xl shadow-lg active:scale-95 transition-transform"><Icon name="send" size={20} color="white" /></button>
                </form>
              </div>
            )}

            {tab === 'tracker' && (
              <div className="flex-1 p-8 space-y-6 flex flex-col justify-center">
                <div className="bg-white p-12 rounded-[60px] text-center shadow-xl border-4 border-rose-50">
                  <p className="text-rose-300 text-xs font-black uppercase tracking-[0.2em] mb-4">Days Since Nov 16</p>
                  <h3 className="text-8xl font-black text-rose-500 tracking-tighter tabular-nums">
                    {Math.floor((new Date() - new Date("2025-11-16")) / (1000 * 60 * 60 * 24))}
                  </h3>
                </div>
                
                <div className="grid grid-cols-2 gap-4">
                  <div className="bg-white p-6 rounded-3xl text-center border border-rose-50">
                    <p className="text-[10px] font-black text-rose-300 uppercase">Started</p>
                    <p className="text-rose-600 font-black">Nov 2025</p>
                  </div>
                  <div className="bg-white p-6 rounded-3xl text-center border border-rose-50">
                    <p className="text-[10px] font-black text-rose-300 uppercase">Goal</p>
                    <p className="text-rose-600 font-black">1000 ❤️</p>
                  </div>
                </div>
              </div>
            )}
          </main>

          <nav className="px-6 py-6 bg-white flex justify-around items-center border-t border-rose-100 pb-10">
            <button onClick={() => setTab('chat')} className={`transition-all ${tab === 'chat' ? 'text-rose-500 scale-125' : 'text-rose-200'}`}><Icon name="chat" size={30}/></button>
            <button onClick={() => setTab('jar')} className={`transition-all ${tab === 'jar' ? 'text-rose-500 scale-125' : 'text-rose-200'}`}><Icon name="heart" size={34} fill={tab === 'jar' ? "currentColor" : "none"}/></button>
            <button onClick={() => setTab('tracker')} className={`transition-all ${tab === 'tracker' ? 'text-rose-500 scale-125' : 'text-rose-200'}`}><Icon name="star" size={30}/></button>
          </nav>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
