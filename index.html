<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Our Space</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    .liquid-fill { transition: height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes heartFloat { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    .heart-pop { position: absolute; animation: heartFloat 0.7s ease-out forwards; pointer-events: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#FFF5F7] overscroll-none select-none">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyAd64Xht4RMPgIBYNssGYeYxFB_zyZUTsk",
      authDomain: "our-space-79672.firebaseapp.com",
      projectId: "our-space-79672",
      storageBucket: "our-space-79672.firebasestorage.app",
      messagingSenderId: "350345009230",
      appId: "1:350345009230:web:91fb621714c21d7e264b1f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const Icon = ({ name, size=24, color="currentColor", fill="none" }) => {
      const paths = {
        heart: "M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z",
        chat: "M7.9 20A9 9 0 1 0 4 16.1L2 22Z",
        star: "m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z",
        send: "M22 2 11 13M22 2l-7 20-4-9-9-4 22-7Z",
        lock: "M7 11V7a5 5 0 0 1 10 0v4M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z"
      };
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d={paths[name]} />
        </svg>
      );
    };

    function App() {
      const [isUnlocked, setIsUnlocked] = useState(() => localStorage.getItem('os_unlocked') === 'true');
      const [user, setUser] = useState(() => localStorage.getItem('os_user'));
      const [tab, setTab] = useState('jar');
      const [count, setCount] = useState(0);
      const [messages, setMessages] = useState([]);
      const [pop, setPop] = useState(null);
      const [passInput, setPassInput] = useState("");
      const chatEndRef = useRef(null);

      useEffect(() => {
        auth.signInAnonymously().then(() => {
          db.collection("shared").doc("jar").onSnapshot(doc => {
            if (doc.exists) setCount(doc.data().currentCount || 0);
          });
          db.collection("messages").orderBy("timestamp", "desc").limit(50).onSnapshot(snap => {
            setMessages(snap.docs.map(d => ({ id: d.id, ...d.data() })).reverse());
          });
        });
      }, []);

      useEffect(() => {
        if (tab === 'chat') chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, tab]);

      const handleUnlock = (e) => {
        e.preventDefault();
        // CLEANUP INPUT FOR MOBILE KEYBOARDS
        const cleanPass = passInput.trim().toLowerCase();
        if (cleanPass === "nikiarjun") {
          setIsUnlocked(true);
          localStorage.setItem('os_unlocked', 'true');
        } else {
          alert("Incorrect Password");
        }
      };

      const handleAddHeart = async (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        setPop({ x: clientX - rect.left, y: clientY - rect.top });
        setTimeout(() => setPop(null), 600);
        
        if (count + 1 >= 1000) {
          await db.collection("shared").doc("jar").update({ currentCount: 0 });
        } else {
          await db.collection("shared").doc("jar").update({ currentCount: firebase.firestore.FieldValue.increment(1) });
        }
      };

      const handleSend = async (e) => {
        e.preventDefault();
        const text = e.target.msg.value;
        if (!text.trim()) return;
        e.target.msg.value = "";
        await db.collection("messages").add({
          text, sender: user, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
      };

      if (!isUnlocked) return (
        <div className="h-screen flex flex-col items-center justify-center p-10 bg-white">
          <Icon name="lock" size={48} color="#f43f5e" />
          <h2 className="mt-4 mb-6 font-bold text-gray-400 uppercase tracking-widest text-xs">Private Access</h2>
          <form onSubmit={handleUnlock} className="w-full max-w-xs space-y-3">
            <input 
              type="text" 
              autoCapitalize="none"
              placeholder="Password" 
              className="w-full p-4 bg-gray-50 rounded-2xl text-center outline-none border-2 border-transparent focus:border-rose-200 transition-all"
              value={passInput}
              onChange={(e) => setPassInput(e.target.value)}
            />
            <button className="w-full p-4 bg-rose-500 text-white rounded-2xl font-bold shadow-lg shadow-rose-100">Unlock</button>
          </form>
        </div>
      );

      if (!user) return (
        <div className="h-screen flex flex-col items-center justify-center p-10 space-y-4 bg-white">
          <h1 className="text-3xl font-black text-rose-500 mb-4 tracking-tighter">Who are you?</h1>
          <button onClick={() => {setUser('Niki'); localStorage.setItem('os_user', 'Niki')}} className="w-full p-6 bg-white rounded-3xl shadow-xl text-xl font-bold text-rose-500 border-2 border-rose-50">Niki</button>
          <button onClick={() => {setUser('Arjun'); localStorage.setItem('os_user', 'Arjun')}} className="w-full p-6 bg-white rounded-3xl shadow-xl text-xl font-bold text-rose-500 border-2 border-rose-50">Arjun</button>
        </div>
      );

      return (
        <div className="h-screen flex flex-col bg-[#FFF5F7] max-w-md mx-auto overflow-hidden shadow-2xl">
          {/* Header */}
          <header className="p-5 flex justify-between items-center bg-white/50 backdrop-blur-sm border-b border-rose-50">
            <div className="flex items-center gap-2">
              <Icon name="heart" size={20} color="#f43f5e" fill="#f43f5e" />
              <span className="font-black text-rose-600 tracking-tighter">OUR SPACE</span>
            </div>
            <button onClick={() => {localStorage.clear(); window.location.reload();}} className="text-[10px] font-bold text-rose-300 uppercase tracking-widest">Reset</button>
          </header>

          <main className="flex-1 relative overflow-hidden flex flex-col">
            {tab === 'jar' && (
              <div className="flex-1 flex flex-col items-center justify-around py-10 px-6">
                <div className="text-center">
                  <h2 className="text-2xl font-bold text-rose-900 tracking-tight">The Mood Jar</h2>
                  <p className="text-rose-400 text-sm font-medium italic">Fills as we grow</p>
                </div>

                {/* THE JAR */}
                <div className="relative w-64 h-80 flex items-end justify-center">
                  <div className="absolute inset-0 border-[6px] border-white bg-white/40 rounded-b-[90px] rounded-t-2xl shadow-2xl overflow-hidden">
                    <div className="absolute bottom-0 w-full bg-gradient-to-t from-rose-500 to-pink-300 liquid-fill" style={{ height: `${(count/1000)*100}%` }} />
                    <div className="absolute inset-0 flex items-center justify-center">
                      <span className="text-6xl font-black text-rose-900/10 select-none">{count}</span>
                    </div>
                  </div>
                </div>

                <button onClick={handleAddHeart} className="relative w-28 h-28 bg-rose-500 rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform border-4 border-white">
                  <Icon name="heart" size={48} color="white" fill="white" />
                  {pop && <div className="heart-pop" style={{ left: pop.x, top: pop.y }}><Icon name="heart" size={32} color="#FDA4AF" fill="#FDA4AF" /></div>}
                </button>
              </div>
            )}

            {tab === 'chat' && (
              <div className="flex-1 flex flex-col h-full bg-white/30 backdrop-blur-md">
                <div className="flex-1 overflow-y-auto p-4 space-y-3 hide-scrollbar">
                  {messages.map(m => (
                    <div key={m.id} className={`flex ${m.sender === user ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[80%] p-3.5 rounded-2xl shadow-sm text-sm font-semibold ${m.sender === user ? 'bg-rose-500 text-white rounded-br-none' : 'bg-white text-rose-900 rounded-bl-none'}`}>
                        {m.text}
                      </div>
                    </div>
                  ))}
                  <div ref={chatEndRef} />
                </div>
                <form onSubmit={handleSend} className="p-4 bg-white flex gap-2 border-t border-rose-50">
                  <input name="msg" className="flex-1 bg-rose-50/50 border border-rose-100 p-3.5 rounded-2xl outline-none text-sm font-medium" placeholder="Type a message..." />
                  <button className="bg-rose-500 text-white p-3.5 rounded-2xl shadow-lg active:scale-95 transition-transform"><Icon name="send" size={18} color="white" /></button>
                </form>
              </div>
            )}

            {tab === 'tracker' && (
              <div className="flex-1 p-8 space-y-6 flex flex-col justify-center items-center">
                <div className="bg-white/80 w-full p-10 rounded-[45px] text-center shadow-xl border-2 border-white">
                  <p className="text-rose-300 text-[10px] font-black uppercase tracking-widest mb-2">Days Together</p>
                  <h3 className="text-6xl font-black text-rose-500 tabular-nums">
                    {Math.floor((new Date() - new Date("2025-11-16")) / (1000 * 60 * 60 * 24))}
                  </h3>
                </div>
                <div className="w-full space-y-3">
                   <div className="bg-white/50 p-5 rounded-3xl flex justify-between items-center border border-white">
                      <span className="font-bold text-rose-800">Our Date</span>
                      <span className="text-rose-500 font-black">Nov 16, 2025</span>
                   </div>
                </div>
              </div>
            )}
          </main>

          {/* Navigation */}
          <nav className="p-6 bg-white/90 flex justify-around items-center border-t border-rose-50 pb-8">
            <button onClick={() => setTab('chat')} className={tab === 'chat' ? 'text-rose-500 scale-125 transition-all' : 'text-rose-200'}><Icon name="chat" size={28}/></button>
            <button onClick={() => setTab('jar')} className={tab === 'jar' ? 'text-rose-500 scale-125 transition-all' : 'text-rose-200'}><Icon name="heart" size={32} fill={tab === 'jar' ? "currentColor" : "none"}/></button>
            <button onClick={() => setTab('tracker')} className={tab === 'tracker' ? 'text-rose-500 scale-125 transition-all' : 'text-rose-200'}><Icon name="star" size={28}/></button>
          </nav>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
